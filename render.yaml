# Render.com Blueprint — Ara WhatsApp AI Chatbot
# https://render.com/docs/blueprint-spec
#
# Secrets (REDIS_URL, OLLAMA_API_KEY, JWT_SECRET, DASHBOARD_PASSWORD_HASH) and
# the required OWNER_NUMBER use `sync: false` so they are set once in the
# Render dashboard and persist across blueprint re-syncs (Render will NOT
# overwrite them). Optional vars below have in-code defaults; leave them blank
# on first deploy and the app will fall back to those defaults.
#
# NOTE: PORT is intentionally omitted — Render auto-injects PORT for web
# services, and the app reads process.env.PORT (fallback 10000).

services:
  - type: web
    name: ara-waifu-bot
    runtime: node
    region: sin
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      # ── Required secrets (set once in dashboard, persist via sync: false) ──
      - key: REDIS_URL
        sync: false
      - key: OLLAMA_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DASHBOARD_PASSWORD_HASH
        sync: false
      # ── Required, non-secret (set once in dashboard, persist) ──
      - key: OWNER_NUMBER
        sync: false
      # ── Optional (in-code defaults; may be left blank) ──
      - key: OWNER_NAME
        value: ''
      - key: BLACKLIST
        value: ''
      - key: OLLAMA_MODEL
        value: ''
      - key: OLLAMA_TIMEOUT_MS
        value: ''
      - key: MAX_CONTEXT_MESSAGES
        value: ''
      - key: MAX_GROUP_CONTEXT_MESSAGES
        value: ''
      - key: GROUP_CTX_TTL_DAYS
        value: ''
      - key: AUTO_CHAT_ENABLED
        value: ''
      - key: LOG_LEVEL
        value: ''
      - key: CIRCUIT_BREAKER_THRESHOLD
        value: ''
      - key: CIRCUIT_BREAKER_COOLDOWN_MS
        value: ''
      - key: CHUNK_SEND_RETRY
        value: ''
      - key: WA_PRINT_QR
        value: 'false'
      - key: OLLAMA_HOST
        value: ''
      - key: OLLAMA_RETRY_BASE_MS
        value: ''
      - key: OLLAMA_WEB_BASE
        value: ''
      - key: WHITELIST
        value: ''
      - key: CIRCUIT_BREAKER_FALLBACK
        value: ''
      - key: AUTO_CHAT_INTERVAL_MS
        value: ''
      - key: AUTO_CHAT_MIN_GAP_MS
        value: ''
      - key: ENABLE_CONTEXT_SUMMARY
        value: ''